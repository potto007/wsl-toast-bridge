site_name: wsl-toast-bridge
site_description: Windows toast notifications from WSL, with click-to-focus back to your terminal and Herdr pane
site_url: https://potto007.github.io/wsl-toast-bridge/
repo_url: https://github.com/potto007/wsl-toast-bridge
edit_uri: ""

theme:
  name: material
  icon:
    logo: material/bell-ring-outline
  palette:
    - media: "(prefers-color-scheme)"
      toggle: {icon: material/brightness-auto, name: Follow system theme}
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep orange
      toggle: {icon: material/brightness-7, name: Switch to dark mode}
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle: {icon: material/brightness-4, name: Switch to light mode}
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - Overview: index.md
  - Install: install.md
  - Usage: usage.md
  - Architecture: architecture.md
  - Gotchas: gotchas.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc: {permalink: true}
  - pymdownx.details
  - pymdownx.emoji:          # required for :material-*: / :fontawesome-*: shortcodes
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight: {anchor_linenums: true}
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.tabbed: {alternate_style: true}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/potto007/wsl-toast-bridge
